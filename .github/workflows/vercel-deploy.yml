# Optional: deploy from GitHub without opening vercel.com for each release.
# One-time: add secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# (run `npx vercel link` locally — IDs are in .vercel/project.json; token: vercel.com/account/tokens)
#
# Backend URL for the game client: edit `client/.env.production` in git (no Vercel env UI).

name: Deploy client to Vercel

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: rm -rf .vercel

      - run: npm ci

      - name: Build client
        run: npm run build -w client
        working-directory: client

      - name: Deploy to Vercel (production)
        run: npx vercel@latest --prod --yes --built-project-directory=dist
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
