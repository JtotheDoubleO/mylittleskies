# Optional: only if nothing else uses host port 5432.
# If you already have Postgres (e.g. another container), use that DB and server/.env instead.
# Local Postgres — matches server/.env DATABASE_URL (give_dev_user / dev / mylittleskies)
services:
  db:
    image: postgres:16-alpine
    container_name: mylittleskies-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: give_dev_user
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: mylittleskies
    ports:
      - "5432:5432"
    volumes:
      - mylittleskies_pgdata:/var/lib/postgresql/data

volumes:
  mylittleskies_pgdata:
